apiVersion: apps/v1
kind: # [...]
metadata:
  name: redis
  namespace: # [...]
spec:
  replicas: # [...]
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: # [...]
          readinessProbe:
            # [...]
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"